name: Frontend Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ezrules/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ezrules/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend unit tests with coverage
        run: npm run test:coverage

      - name: Verify frontend coverage inventory
        run: |
          summary_path="coverage/ezrules-frontend/coverage-summary.json"
          expected_count="$(find src/app -type f -name '*.ts' ! -name '*.spec.ts' | wc -l | xargs)"
          reported_count="$(jq '[keys[] | select(. != "total" and contains("src/app/"))] | length' "$summary_path")"
          if [ "$reported_count" != "$expected_count" ]; then
            echo "Expected coverage for $expected_count application files, found $reported_count." >&2
            exit 1
          fi

      - name: Publish frontend coverage summary
        if: always() && hashFiles('ezrules/frontend/coverage/ezrules-frontend/coverage-summary.json') != ''
        run: |
          summary_path="coverage/ezrules-frontend/coverage-summary.json"
          {
            echo "## Frontend coverage"
            echo
            echo "| Metric | Covered | Total | Coverage |"
            echo "| --- | ---: | ---: | ---: |"
            jq -r '.total | to_entries[] | "| \(.key) | \(.value.covered) | \(.value.total) | \(.value.pct)% |"' "$summary_path"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-${{ github.sha }}
          path: ezrules/frontend/coverage/ezrules-frontend
          if-no-files-found: warn
