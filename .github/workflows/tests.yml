name: Backend Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
          POSTGRES_DB: tests
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      EZRULES_DB_ENDPOINT: postgresql://postgres:root@localhost:5432/tests
      EZRULES_TESTING: "true"
      EZRULES_APP_SECRET: "test-secret"
      EZRULES_ORG_ID: "1"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install UV
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true

    - name: Install dependencies
      run: uv sync --dev

    - name: Apply database migrations
      run: uv run alembic upgrade head

    - name: Run backend and CLI tests
      run: uv run pytest -q --cov=ezrules.backend --cov=ezrules.core --cov-report=xml tests

  redis-celery-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
          POSTGRES_DB: tests
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      EZRULES_DB_ENDPOINT: postgresql://postgres:root@localhost:5432/tests
      EZRULES_TESTING: "false"
      EZRULES_APP_SECRET: "test-secret"
      EZRULES_ORG_ID: "1"
      EZRULES_CELERY_BROKER_URL: redis://localhost:6379/0
      EZRULES_OBSERVATION_QUEUE_REDIS_URL: redis://localhost:6379/0
      EZRULES_OBSERVATION_QUEUE_KEY: ezrules:ci:field_observation_queue
      EZRULES_OBSERVATION_QUEUE_LOCK_KEY: ezrules:ci:field_observation_queue:lock
      EZRULES_OBSERVATION_QUEUE_DRAIN_BATCH_SIZE: "1"
      EZRULES_OBSERVATION_QUEUE_MAX_BATCHES_PER_DRAIN: "10"
      EZRULES_SHADOW_EVALUATION_QUEUE_REDIS_URL: redis://localhost:6379/0
      EZRULES_SHADOW_EVALUATION_QUEUE_KEY: ezrules:ci:shadow_evaluation_queue
      EZRULES_SHADOW_EVALUATION_QUEUE_LOCK_KEY: ezrules:ci:shadow_evaluation_queue:lock
      EZRULES_SHADOW_EVALUATION_QUEUE_DRAIN_BATCH_SIZE: "1"
      EZRULES_SHADOW_EVALUATION_QUEUE_MAX_BATCHES_PER_DRAIN: "10"
      EZRULES_LIVE_REDIS_CELERY_SMOKE: "true"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install UV
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true

    - name: Install dependencies
      run: uv sync --dev

    - name: Apply database migrations
      run: uv run alembic upgrade head

    - name: Start Celery workers
      run: |
        nohup uv run celery -A ezrules.backend.tasks worker -l INFO --pool=solo --concurrency=1 -n recovery-a@%h > /tmp/ezrules-worker-a.log 2>&1 &
        echo $! > /tmp/ezrules-worker-a.pid
        nohup uv run celery -A ezrules.backend.tasks worker -l INFO --pool=solo --concurrency=1 -n recovery-b@%h > /tmp/ezrules-worker-b.log 2>&1 &
        echo $! > /tmp/ezrules-worker-b.pid

    - name: Wait for Celery workers
      run: |
        for i in {1..30}; do
          if [ "$(uv run celery -A ezrules.backend.tasks inspect ping --timeout=5 | grep -c "pong" || true)" -ge 2 ]; then
            exit 0
          fi
          sleep 2
        done
        echo "Workers did not become ready in time"
        cat /tmp/ezrules-worker-a.log || true
        cat /tmp/ezrules-worker-b.log || true
        exit 1

    - name: Run Redis/Celery smoke tests
      run: uv run pytest -q tests/test_redis_celery_smoke.py

    - name: Show Celery worker log on failure
      if: failure()
      run: |
        cat /tmp/ezrules-worker-a.log || true
        cat /tmp/ezrules-worker-b.log || true

    - name: Stop Celery workers
      if: always()
      run: |
        for pid_file in /tmp/ezrules-worker-a.pid /tmp/ezrules-worker-b.pid; do
          if [ -f "$pid_file" ]; then
            kill "$(cat "$pid_file")" || true
          fi
        done
