# Production-like single-host validation stack.
# Intended for local validation of the production images and startup sequence.
# For one AWS-oriented deployment example, see docs/architecture/deployment.md.
#
# Setup:
#   cp .env.example .env   # then edit .env with EZRULES_APP_SECRET, EZRULES_ORG_NAME, EZRULES_ADMIN_EMAIL, and EZRULES_ADMIN_PASSWORD
#   docker compose -f docker-compose.prod.yml up --build
#
# Access:
#   Frontend: http://localhost:4200
#   API:      http://localhost:8888
#   Mail UI:  http://localhost:8025 (default local Mailpit)

services:
  postgres:
    image: postgres:16.0-alpine3.18
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_HOST_AUTH_METHOD: trust
      LC_CTYPE: en_US.UTF-8
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI

  # Runs once on first boot to initialise the DB and bootstrap the first org/admin.
  # Safe to re-run: init-db keeps an existing DB, Alembic applies pending
  # migrations, and bootstrap-org reuses the existing org/admin while ensuring defaults exist.
  init:
    build: .
    command: >
      sh -c "echo N | uv run ezrules init-db &&
             uv run alembic upgrade head &&
             uv run ezrules bootstrap-org --name ${EZRULES_ORG_NAME:-base} --admin-email ${EZRULES_ADMIN_EMAIL} --admin-password ${EZRULES_ADMIN_PASSWORD}"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      EZRULES_DB_ENDPOINT: postgresql://postgres:root@postgres:5432/ezrules
      EZRULES_APP_SECRET: ${EZRULES_APP_SECRET}
    restart: "no"

  api:
    build: .
    command: uv run ezrules api --port 8888
    ports:
      - "8888:8888"
    depends_on:
      init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      EZRULES_DB_ENDPOINT: postgresql://postgres:root@postgres:5432/ezrules
      EZRULES_APP_SECRET: ${EZRULES_APP_SECRET}
      EZRULES_CELERY_BROKER_URL: redis://redis:6379
      EZRULES_CORS_ALLOWED_ORIGINS: http://localhost:4200
      EZRULES_SMTP_HOST: ${EZRULES_SMTP_HOST:-mailpit}
      EZRULES_SMTP_PORT: ${EZRULES_SMTP_PORT:-1025}
      EZRULES_SMTP_USER: ${EZRULES_SMTP_USER:-}
      EZRULES_SMTP_PASSWORD: ${EZRULES_SMTP_PASSWORD:-}
      EZRULES_FROM_EMAIL: ${EZRULES_FROM_EMAIL:-no-reply@ezrules.local}
      EZRULES_APP_BASE_URL: ${EZRULES_APP_BASE_URL:-http://localhost:4200}

  worker:
    build: .
    command: uv run celery -A ezrules.backend.tasks worker -l INFO --pool=solo
    depends_on:
      init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      EZRULES_DB_ENDPOINT: postgresql://postgres:root@postgres:5432/ezrules
      EZRULES_APP_SECRET: ${EZRULES_APP_SECRET}
      EZRULES_CELERY_BROKER_URL: redis://redis:6379

  beat:
    build: .
    command: uv run celery -A ezrules.backend.tasks beat -l INFO
    depends_on:
      init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      EZRULES_DB_ENDPOINT: postgresql://postgres:root@postgres:5432/ezrules
      EZRULES_APP_SECRET: ${EZRULES_APP_SECRET}
      EZRULES_CELERY_BROKER_URL: redis://redis:6379

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        EZRULES_FRONTEND_API_URL: http://localhost:8888
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  pgdata_prod:
